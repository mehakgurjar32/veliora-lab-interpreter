<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veliora 🌿</title>

<style>
:root {
  --bg: #F6F8F7;
  --text: #2F3E3E;
  --accent: #84A98C;
  --olive: #5F7F5F;
  --card: rgba(255,255,255,0.75);
}

body.dark {
  --bg: #1f2f2f;
  --text: #e6f0f0;
  --card: rgba(255,255,255,0.08);
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s ease;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:var(--card);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:1000;
}

nav h2 {
  margin:0;
  color:var(--accent);
}

/* TOGGLE */
.toggle-wrapper {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}

.toggle-text {
  font-size:0.7rem;
  color:#52796F;
}

.switch {
  position:relative;
  width:44px;
  height:22px;
}

.switch input {
  display:none;
}

.slider {
  position:absolute;
  background:#ccc;
  border-radius:20px;
  width:100%;
  height:100%;
  cursor:pointer;
  transition:0.4s;
}

.slider:before {
  content:"";
  position:absolute;
  height:16px;
  width:16px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:0.4s;
}

input:checked + .slider {
  background:var(--accent);
  box-shadow:0 0 10px rgba(132,169,140,0.6);
}

input:checked + .slider:before {
  transform:translateX(20px);
}

/* HERO SECTION */
.hero {
  height:90vh;
  background: url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=1400') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

.hero h1,
.hero p,
.hero a {
  position:relative;
}

.hero h1 {
  font-size:3rem;
}

.hero p {
  max-width:500px;
  margin-top:10px;
}

.btn {
  margin-top:20px;
  padding:12px 24px;
  background:var(--accent);
  color:white;
  border-radius:30px;
  text-decoration:none;
}

/* FEATURES */
.features {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:40px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:16px;
  text-align:center;
}

/* IMAGE SECTIONS */
.section {
  text-align:center;
  padding:40px 20px;
}

.section img {
  width:100%;
  max-width:500px;
  border-radius:20px;
}

.caption {
  margin-top:10px;
  color:#52796F;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
}

.name {
  color:var(--olive);
  font-weight:700;
}

/* MUSIC BUTTON */
.music-btn {
  position:fixed;
  bottom:90px;
  right:20px;
  background:var(--accent);
  color:white;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

/* CHAT FIX */
iframe {
  bottom:20px !important;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h2>Veliora 🌿</h2>

  <div class="toggle-wrapper">
    <label class="switch">
      <input type="checkbox" onclick="toggleMode()">
      <span class="slider"></span>
    </label>
    <span class="toggle-text">Dark mode</span>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Veliora 🌿</h1>
  <p>Your calm space to understand lab reports</p>
  <a href="#" class="btn">Start Exploring</a>
</section>

<!-- FEATURES -->
<section class="features">
  <div class="card">🧠 Smart Interpretation</div>
  <div class="card">🍎 Diet Suggestions</div>
  <div class="card">🌿 Lifestyle Guidance</div>
  <div class="card">📊 Report Summary</div>
</section>

<!-- IMAGES -->
<section class="section">
  <img src="https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=800">
  <div class="caption">Calm wellness 🌿</div>
</section>

<section class="section">
  <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?w=800">
  <div class="caption">Minimal lifestyle 🌸</div>
</section>

<!-- FOOTER -->
<footer>
  Made by <span class="name">Mehak Gurjar</span> 🌿
</footer>

<!-- MUSIC -->
<div class="music-btn" onclick="toggleMusic()">🎧</div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946c3c8e58.mp3">
</audio>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}

const music = document.getElementById("bgMusic");

/* Enable sound after first user interaction */
document.body.addEventListener("click", () => {
  if (music.paused) {
    music.volume = 0.25;
    music.play();
  }
}, { once: true });

function toggleMusic(){
  const btn = document.querySelector(".music-btn");

  if (music.paused) {
    music.play();
    btn.innerHTML = "🔊";
  } else {
    music.pause();
    btn.innerHTML = "🎧";
  }
}
</script>

<!-- WATSON ASSISTANT -->
<script>
window.watsonAssistantChatOptions = {
  integrationID: "7aeb8f53-5891-40d7-80d9-bb93e2fa37d4",
  region: "eu-de",
  serviceInstanceID: "f3f2da03-ddee-4da0-b22f-2a7277620229",
  onLoad: async (instance) => {
    await instance.render();
    instance.updateCSSVariables({"BASE-z-index":"9999"});
  }
};
setTimeout(function(){
  const t=document.createElement('script');
  t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
  + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
  + "/WatsonAssistantChatEntry.js";
  document.body.appendChild(t);
});
</script>

</body>
</html>
