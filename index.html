<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veliora 🌿</title>

<style>
:root {
  --bg: #F6F8F7;
  --text: #2F3E3E;
  --accent: #84A98C;
  --glass: rgba(255,255,255,0.6);
}

body.dark {
  --bg: #1f2f2f;
  --text: #e6f0f0;
  --glass: rgba(255,255,255,0.08);
}

body {
  margin: 0;
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s ease;
  overflow-x: hidden;
}

/* SCROLL BAR */
.progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: var(--accent);
  width: 0%;
  z-index: 2000;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  backdrop-filter: blur(12px);
  background: var(--glass);
  display: flex;
  justify-content: space-between;
  padding: 14px 28px;
  z-index: 1000;
}

nav h2 {
  margin: 0;
  color: var(--accent);
  font-size: 1.2rem;
}

/* TOGGLE */
.switch {
  width: 46px;
  height: 22px;
  position: relative;
}
.switch input { display:none; }
.slider {
  position:absolute;
  background:#ccc;
  border-radius:20px;
  width:100%; height:100%;
  cursor:pointer;
}
.slider:before {
  content:"";
  position:absolute;
  height:16px; width:16px;
  left:3px; bottom:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}
input:checked + .slider {
  background:var(--accent);
}
input:checked + .slider:before {
  transform:translateX(22px);
}

/* HERO */
.hero {
  text-align:center;
  padding:130px 20px 80px;
  max-width:800px;
  margin:auto;
}

.hero h1 {
  font-size:2.8rem;
  letter-spacing:-0.5px;
}

.hero p {
  margin-top:12px;
  color:#52796F;
  font-size:1.05rem;
}

/* BUTTON */
.btn {
  margin-top:22px;
  display:inline-block;
  padding:12px 24px;
  background:var(--accent);
  color:white;
  border-radius:28px;
  text-decoration:none;
  font-size:0.95rem;
}

/* FEATURES */
.features {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:40px 20px;
  max-width:1000px;
  margin:auto;
}

.card {
  background:var(--glass);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:22px;
  transition:0.3s;
  font-size:0.95rem;
}
.card:hover {
  transform:translateY(-6px);
}

/* IMAGE SECTIONS */
.section {
  height:90vh;
  position:relative;
}

.section img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
}

.overlay h2 {
  font-weight:500;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  font-size:0.9rem;
}

.name {
  color:var(--accent);
  font-weight:600;
}

/* CHAT FIX */
iframe {
  bottom:20px !important;
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<nav>
  <h2>Veliora 🌿</h2>
  <label class="switch">
    <input type="checkbox" onclick="toggleMode()">
    <span class="slider"></span>
  </label>
</nav>

<section class="hero">
  <h1>Veliora 🌿</h1>
  <p id="typing"></p>
  <a href="#" class="btn">Start Exploring</a>
</section>

<section class="features">
  <div class="card">🧠 Understand lab values instantly</div>
  <div class="card">🍎 Get simple diet guidance</div>
  <div class="card">🌿 Improve lifestyle habits</div>
  <div class="card">📊 View clear summaries</div>
</section>

<section class="section">
  <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=1200">
  <div class="overlay"><h2>Clarity, not confusion 🌿</h2></div>
</section>

<section class="section">
  <img src="https://images.unsplash.com/photo-1505576399279-565b52d4ac71?w=1200">
  <div class="overlay"><h2>Designed to feel calm 🌸</h2></div>
</section>

<footer>
  Made by <span class="name">Mehak Gurjar</span> 🌿
</footer>

<script>
// DARK MODE
function toggleMode(){
  document.body.classList.toggle("dark");
}

// TYPING
const text = "Turning medical reports into simple, clear insights 🌿";
let i = 0;
function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 35);
  }
}
type();

// SCROLL BAR
window.onscroll = () => {
  let winScroll = document.documentElement.scrollTop;
  let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById("progress").style.width = (winScroll / height) * 100 + "%";
};
</script>

<!-- WATSON -->
<script>
window.watsonAssistantChatOptions = {
  integrationID: "7aeb8f53-5891-40d7-80d9-bb93e2fa37d4",
  region: "eu-de",
  serviceInstanceID: "f3f2da03-ddee-4da0-b22f-2a7277620229",
  onLoad: async (instance) => {
    await instance.render();
    instance.updateCSSVariables({"BASE-z-index":"9999"});
  }
};
setTimeout(function(){
  const t=document.createElement('script');
  t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
  + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
  + "/WatsonAssistantChatEntry.js";
  document.body.appendChild(t);
});
</script>

</body>
</html>
